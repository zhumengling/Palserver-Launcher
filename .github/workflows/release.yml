name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-amd64:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify tag and project versions
        shell: pwsh
        run: |
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          $packageVersion = (Get-Content -Raw frontend/package.json | ConvertFrom-Json).version
          $wailsVersion = (Get-Content -Raw wails.json | ConvertFrom-Json).info.productVersion
          $launcherVersion = [regex]::Match((Get-Content -Raw launcher_update.go), 'LauncherVersion\s*=\s*"([^"]+)"').Groups[1].Value
          $readmeVersion = [regex]::Match((Get-Content -Raw README.md), '当前版本：\*\*([^*]+)\*\*').Groups[1].Value
          $versions = @($packageVersion, $wailsVersion, $launcherVersion, $readmeVersion)
          if ($versions | Where-Object { $_ -ne $tagVersion }) {
            throw "Tag $tagVersion does not match project versions: $($versions -join ', ')"
          }

      - name: Install and test
        shell: pwsh
        run: |
          npm ci --prefix frontend
          go test -count=1 ./...
          go vet ./...
          npm test --prefix frontend

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build Windows release asset
        shell: pwsh
        run: |
          go build -tags webpreview -o build/bin/palserver-web-preview.exe .
          wails build -platform windows/amd64 -trimpath -m -o palserver-launcher-windows-amd64.exe

      - name: Create Windows checksum
        shell: pwsh
        run: |
          $asset = 'build/bin/palserver-launcher-windows-amd64.exe'
          if (-not (Test-Path -LiteralPath $asset)) { throw "Missing $asset" }
          if ((Get-Item -LiteralPath $asset).Length -lt 1MB) { throw 'Launcher asset is unexpectedly small' }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset).Hash.ToLowerInvariant()
          "$hash  palserver-launcher-windows-amd64.exe" | Set-Content -Encoding ascii "$asset.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: |
            build/bin/palserver-launcher-windows-amd64.exe
            build/bin/palserver-launcher-windows-amd64.exe.sha256
          if-no-files-found: error

  build-linux-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build and test Linux web agent
        run: |
          npm ci --prefix frontend
          npm test --prefix frontend
          npm run build --prefix frontend
          go test -count=1 ./...
          go vet ./...
          bash -n deploy/linux/install.sh deploy/linux/install-online.sh deploy/linux/uninstall.sh deploy/linux/smoke-test.sh
          go build -tags webpreview -o build/bin/palserver-web-preview .
          CGO_ENABLED=0 go build -trimpath -o build/bin/pal-agent-linux-amd64 .
          bash deploy/linux/smoke-test.sh build/bin/pal-agent-linux-amd64

      - name: Package Linux release asset with executable modes
        run: |
          go run ./cmd/package-linux
          mkdir -p build/package-check
          tar -xzf build/palserver-agent-linux-amd64.tar.gz -C build/package-check
          test -x build/package-check/pal-agent
          test -x build/package-check/install.sh
          test -x build/package-check/uninstall.sh
          test -f build/package-check/palserver-agent.service
          test -f build/package-check/README-linux.md
          (cd build && sha256sum -c palserver-agent-linux-amd64.tar.gz.sha256)

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: |
            build/palserver-agent-linux-amd64.tar.gz
            build/palserver-agent-linux-amd64.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: [build-windows-amd64, build-linux-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Verify release files
        run: |
          test -s release/palserver-launcher-windows-amd64.exe
          test -s release/palserver-launcher-windows-amd64.exe.sha256
          test -s release/palserver-agent-linux-amd64.tar.gz
          test -s release/palserver-agent-linux-amd64.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/palserver-launcher-windows-amd64.exe
            release/palserver-launcher-windows-amd64.exe.sha256
            release/palserver-agent-linux-amd64.tar.gz
            release/palserver-agent-linux-amd64.tar.gz.sha256
